<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal | CTF</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-emerald-500 font-mono min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full p-8 bg-zinc-900 border border-emerald-500/30 rounded-lg shadow-[0_0_20px_rgba(16,185,129,0.1)]">
        <header class="mb-8 border-b border-emerald-500/20 pb-4 text-center">
            <h1 class="text-3xl font-bold tracking-tighter uppercase">Cookie Monster v1.0</h1>
            <p class="text-xs text-emerald-700 mt-2">SYSTEM STATUS: <span class="animate-pulse">ONLINE</span></p>
        </header>

        <main class="space-y-6">
            <div class="bg-zinc-950 p-4 rounded border border-emerald-900">
                <p class="text-sm text-zinc-400 uppercase mb-1">Current Identity</p>
                <p class="text-xl">Role: <span class="text-white font-bold">{{ role }}</span></p>
            </div>

            <div class="flex flex-col gap-3">
                <a href="/login" class="block w-full text-center bg-emerald-600 hover:bg-emerald-500 text-zinc-950 font-bold py-2 rounded transition-colors">
                    LOGIN
                </a>
                <a href="/admin" class="block w-full text-center border border-emerald-600 hover:bg-emerald-600/10 py-2 rounded transition-colors text-sm">
                    ADMIN PAGE
                </a>
            </div>
        </main>
    </div>
</body>
</html>
